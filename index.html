<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Nudge</title>

  <!-- PWA / iOS fullscreen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nudge">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="/favicon.ico" type="image/png">

  <!-- Keep screen awake -->
  <meta http-equiv="refresh" content="300">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&family=Roboto:wght@500&display=swap">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <!-- Auth screen -->
    <div id="auth-screen" class="screen">
      <div class="auth-content">
        <h1><span id="nudge-word">Nudge</span> Calendar</h1>
        <p class="auth-tagline">A playful, glanceable calendar for your phone.</p>
        <p class="auth-desc">Keeps upcoming meetings visible while you're deep in the zone.</p>
        <button id="auth-btn" onclick="handleAuth()">
          <svg class="google-logo" viewBox="0 0 48 48" width="20" height="20">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#34A853" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.9 7.35 2.56 10.52l7.97-5.93z"/>
            <path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.93C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Sign in with Google
        </button>
      </div>
      <div class="auth-footer">
        <div class="auth-version" id="auth-version"></div>
        <a class="auth-credit" href="https://wrightbagwell.com" target="_blank">by Wright Bagwell</a>
      </div>
    </div>

    <!-- Calendar screen -->
    <div id="calendar-screen" class="screen hidden">
      <div class="top-bar">
        <header id="date-header"></header>
        <button id="settings-btn" onclick="toggleSettings()" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 -960 960 960" fill="currentColor">
            <path d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm70-80h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Zm42-180q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm-2-140Z"/>
          </svg>
        </button>
      </div>
      <div id="settings-scrim" class="settings-scrim hidden"></div>
      <div id="settings-panel" class="hidden">
        <div class="settings-header">
          <span class="settings-heading">Settings</span>
        </div>
        <div class="settings-divider"></div>
        <div class="setting-row">
          <span class="setting-label">Show tasks</span>
          <label class="toggle-switch" for="tasks-toggle">
            <input type="checkbox" id="tasks-toggle" checked onchange="setShowTasks(this.checked)">
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="settings-divider"></div>

        <div>
          <div class="setting-label">Display size</div>
          <div class="slider-row">
            <span class="slider-label">A</span>
            <input type="range" id="scale-slider" min="70" max="120" step="5" value="100" oninput="setScale(this.value)">
            <span class="slider-label" style="font-size:1.1em; font-weight:700">A</span>
          </div>
        </div>

        <div class="settings-divider"></div>
        <div class="settings-version" id="app-version"></div>
        <a class="settings-link" href="privacy.html" target="_blank">Privacy policy</a>
        <a class="settings-link" href="https://wrightbagwell.com" target="_blank">by Wright Bagwell</a>
        <div class="settings-divider"></div>
        <button id="logout-btn" class="logout-btn" onclick="handleLogout()">Sign out</button>
      </div>
      <div id="pull-indicator" class="pull-indicator">↻ Refresh</div>
      <div id="all-day-row" class="all-day-row hidden"></div>
      <main id="events-list" class="time-grid">
        <div id="hour-gutter" class="hour-gutter"></div>
        <div id="event-column" class="event-column">
          <div id="now-line" class="now-line hidden">
            <div class="now-line-dot"></div>
            <div class="now-line-bar"></div>
          </div>
        </div>
      </main>
      <div id="empty-state" class="hidden">
        <p>Nothing today</p>
      </div>

      <!-- Morning briefing overlay -->
      <div id="briefing-overlay" class="briefing-overlay hidden">
        <div class="briefing-scrim"></div>
        <div class="briefing-content">
          <div class="briefing-header">Your day</div>
          <div id="briefing-cards" class="briefing-cards"></div>
          <button id="briefing-dismiss" class="briefing-dismiss hidden">Got it</button>
        </div>
      </div>
    </div>

    <!-- Loading screen -->
    <div id="loading-screen" class="screen hidden">
      <div class="loader"></div>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
