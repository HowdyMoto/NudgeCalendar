<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Today</title>

  <!-- PWA / iOS fullscreen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Today">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="favicon.ico" type="image/png">

  <!-- Keep screen awake -->
  <meta http-equiv="refresh" content="300">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Auth screen -->
    <div id="auth-screen" class="screen">
      <div class="auth-content">
        <h1>Today</h1>
        <p>Your desk calendar</p>
        <button id="auth-btn" onclick="handleAuth()">Connect Google Calendar</button>
      </div>
    </div>

    <!-- Calendar screen -->
    <div id="calendar-screen" class="screen hidden">
      <button id="settings-btn" onclick="toggleSettings()" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="3"/>
          <path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M3.4 3.4l1.4 1.4M15.2 15.2l1.4 1.4M3.4 16.6l1.4-1.4M15.2 4.8l1.4-1.4"/>
        </svg>
      </button>
      <div id="settings-panel" class="hidden">
        <div class="settings-title">Color mode</div>
        <div id="color-mode-toggle" class="toggle-group">
          <button class="toggle-btn selected" data-mode="urgency" onclick="setColorMode('urgency')">Urgency</button>
          <button class="toggle-btn" data-mode="calendar" onclick="setColorMode('calendar')">Calendar</button>
        </div>
        <div id="urgency-section">
          <div class="settings-title" style="margin-top:12px">Urgency color</div>
          <div id="color-options"></div>
        </div>
        <div class="settings-title" style="margin-top:12px">Display size</div>
        <div class="slider-row">
          <span class="slider-label">A</span>
          <input type="range" id="scale-slider" min="70" max="120" step="5" value="100" oninput="setScale(this.value)">
          <span class="slider-label" style="font-size:1.1em; font-weight:700">A</span>
        </div>
      </div>
      <header id="date-header"></header>
      <div id="now-marker-time" class="now-time"></div>
      <main id="events-list"></main>
      <div id="empty-state" class="hidden">
        <p>Nothing today</p>
      </div>
    </div>

    <!-- Loading screen -->
    <div id="loading-screen" class="screen hidden">
      <div class="loader"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
