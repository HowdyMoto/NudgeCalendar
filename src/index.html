<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Today</title>

  <!-- PWA / iOS fullscreen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Today">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="favicon.ico" type="image/png">

  <!-- Keep screen awake -->
  <meta http-equiv="refresh" content="300">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&family=Roboto:wght@500&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Auth screen -->
    <div id="auth-screen" class="screen">
      <div class="auth-content">
        <h1>Today</h1>
        <p>Your desk calendar</p>
        <button id="auth-btn" onclick="handleAuth()">
          <svg class="google-logo" viewBox="0 0 48 48" width="20" height="20">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#34A853" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.9 7.35 2.56 10.52l7.97-5.93z"/>
            <path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.93C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Sign in with Google
        </button>
      </div>
    </div>

    <!-- Calendar screen -->
    <div id="calendar-screen" class="screen hidden">
      <button id="settings-btn" onclick="toggleSettings()" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="3"/>
          <path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M3.4 3.4l1.4 1.4M15.2 15.2l1.4 1.4M3.4 16.6l1.4-1.4M15.2 4.8l1.4-1.4"/>
        </svg>
      </button>
      <div id="settings-panel" class="hidden">
        <div class="settings-title">Color mode</div>
        <div id="color-mode-toggle" class="toggle-group">
          <button class="toggle-btn selected" data-mode="urgency" onclick="setColorMode('urgency')">Urgency</button>
          <button class="toggle-btn" data-mode="calendar" onclick="setColorMode('calendar')">Calendar</button>
        </div>
        <div id="urgency-section">
          <div class="settings-title" style="margin-top:12px">Urgency color</div>
          <div id="color-options"></div>
        </div>
        <div class="settings-title" style="margin-top:12px">Display size</div>
        <div class="slider-row">
          <span class="slider-label">A</span>
          <input type="range" id="scale-slider" min="70" max="120" step="5" value="100" oninput="setScale(this.value)">
          <span class="slider-label" style="font-size:1.1em; font-weight:700">A</span>
        </div>
      </div>
      <header id="date-header"></header>
      <div id="pull-indicator" class="pull-indicator">↻ Refresh</div>
      <div id="all-day-row" class="all-day-row hidden"></div>
      <main id="events-list" class="time-grid">
        <div id="hour-gutter" class="hour-gutter"></div>
        <div id="event-column" class="event-column">
          <div id="now-line" class="now-line hidden">
            <div class="now-line-dot"></div>
            <div class="now-line-bar"></div>
          </div>
        </div>
      </main>
      <div id="empty-state" class="hidden">
        <p>Nothing today</p>
      </div>

      <!-- Morning briefing overlay -->
      <div id="briefing-overlay" class="briefing-overlay hidden">
        <div class="briefing-scrim"></div>
        <div class="briefing-content">
          <div class="briefing-header">Today's meetings</div>
          <div id="briefing-cards" class="briefing-cards"></div>
          <button id="briefing-dismiss" class="briefing-dismiss hidden">Got it</button>
        </div>
      </div>
    </div>

    <!-- Loading screen -->
    <div id="loading-screen" class="screen hidden">
      <div class="loader"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
